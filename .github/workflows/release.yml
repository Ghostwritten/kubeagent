name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/ghostwritten/kubeagent:latest
            ghcr.io/ghostwritten/kubeagent:${{ steps.version.outputs.version }}
            ghcr.io/ghostwritten/kubeagent:${{ steps.version.outputs.minor }}
            ghcr.io/ghostwritten/kubeagent:${{ steps.version.outputs.major }}
            ghostwritten/kubeagent:latest
            ghostwritten/kubeagent:${{ steps.version.outputs.version }}
            ghostwritten/kubeagent:${{ steps.version.outputs.minor }}
            ghostwritten/kubeagent:${{ steps.version.outputs.major }}

  github-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changes }}

            ## Installation
            ```bash
            pip install kubeagent==${{ github.ref_name }}
            # or
            docker pull ghcr.io/ghostwritten/kubeagent:${{ github.ref_name }}
            ```
          files: dist/*

  update-homebrew:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Wait for PyPI availability
        run: |
          for i in $(seq 1 30); do
            if pip index versions kubeagent 2>/dev/null | grep -q "${{ steps.version.outputs.version }}"; then
              echo "Version available on PyPI"
              exit 0
            fi
            echo "Waiting for PyPI... ($i/30)"
            sleep 10
          done
          echo "Warning: PyPI version not yet available, proceeding anyway"

      - name: Download sdist and compute sha256
        id: sha
        run: |
          pip download kubeagent==${{ steps.version.outputs.version }} --no-binary :all: --no-deps -d /tmp/dist || true
          SDIST=$(ls /tmp/dist/kubeagent-*.tar.gz 2>/dev/null | head -1)
          if [ -n "$SDIST" ]; then
            SHA=$(sha256sum "$SDIST" | cut -d' ' -f1)
          else
            SHA="PLACEHOLDER_SHA256"
          fi
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: Ghostwritten/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "formula": "kubeagent",
              "version": "${{ steps.version.outputs.version }}",
              "sha256": "${{ steps.sha.outputs.sha256 }}"
            }
